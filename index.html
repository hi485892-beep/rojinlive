<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE — Weverse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f2;
    --muted: #888892;
    --accent: #b84fff;
    --live-red: #ff3b5c;
    --pink: #ff6eb4;
    --blue: #5bc4ff;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Pretendard', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Top Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-icons {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .nav-icons svg {
    width: 22px; height: 22px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 1.8;
    cursor: pointer;
    transition: stroke 0.2s;
  }
  .nav-icons svg:hover { stroke: var(--text); }

  /* Video Area */
  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 9/16;
    max-height: 60vh;
    background: #000;
    overflow: hidden;
  }
  @media (min-width: 600px) {
    .video-wrapper { aspect-ratio: 16/9; max-height: 55vh; }
  }
  .video-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: brightness(0.88);
  }

  .overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
  }
  .live-badge {
    background: var(--live-red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    padding: 4px 10px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    animation: pulse-badge 2s infinite;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #fff;
    animation: pulse-dot 1.2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,59,92,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(255,59,92,0); }
  }
  .viewer-count {
    display: flex;
    align-items: center;
    gap: 5px;
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    font-weight: 500;
  }
  .viewer-count svg {
    width: 14px; height: 14px;
    fill: rgba(255,255,255,0.7);
  }

  .overlay-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 40px 16px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  }
  .artist-info {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .artist-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    overflow: hidden;
  }
  .artist-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top;
    filter: brightness(1);
  }
  .artist-name { font-size: 15px; font-weight: 700; color: #fff; }
  .artist-handle { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  .live-title { font-size: 13px; color: rgba(255,255,255,0.85); margin-left: 46px; }

  .timer-bar {
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .timer { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .timer strong { color: var(--live-red); font-weight: 600; }
  .reaction-row { display: flex; gap: 16px; }
  .react-btn {
    background: none; border: none; cursor: pointer;
    font-size: 20px; transition: transform 0.1s; position: relative;
  }
  .react-btn:active { transform: scale(1.4); }
  .react-count {
    font-size: 11px; color: var(--muted);
    position: absolute; bottom: -14px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }

  .main-content {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  @media (min-width: 900px) {
    .main-content { flex-direction: row; }
    .chat-panel { width: 360px; min-width: 320px; }
  }

  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-left: 1px solid var(--border);
  }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }
  .chat-header svg {
    width: 16px; height: 16px;
    stroke: var(--accent); fill: none; stroke-width: 2;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: 340px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-msg {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 14px;
    transition: background 0.15s;
  }
  .chat-msg:hover { background: rgba(255,255,255,0.03); }
  .artist-msg { background: rgba(184,79,255,0.06); border-left: 2px solid var(--accent); }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .msg-body { flex: 1; min-width: 0; }
  .msg-user { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .msg-text { font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-word; }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .system-msg {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 14px;
    background: rgba(255,255,255,0.03);
    margin: 4px 14px;
    border-radius: 6px;
  }
  .chat-input-area {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg {
    width: 15px; height: 15px;
    stroke: #fff; fill: none; stroke-width: 2;
  }

  .bottom-actions {
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .action-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 11px; font-weight: 500;
    transition: color 0.2s;
  }
  .action-btn svg {
    width: 22px; height: 22px;
    stroke: currentColor; fill: none; stroke-width: 1.8;
    transition: stroke 0.2s, fill 0.2s;
  }
  .action-btn.active { color: var(--pink); }

  .hearts-container {
    position: fixed;
    bottom: 80px; right: 20px;
    width: 40px;
    pointer-events: none;
    z-index: 200;
  }
  .floating-heart {
    position: absolute;
    font-size: 22px;
    animation: floatHeart 2.5s ease-out forwards;
    bottom: 0;
  }
  @keyframes floatHeart {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 0.8; transform: translateY(-80px) scale(1.2) rotate(-10deg); }
    100% { opacity: 0; transform: translateY(-150px) scale(0.5) rotate(15deg); }
  }
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" stroke="#b84fff" stroke-width="2"/>
      <path d="M7 11.5L10 14.5L15 8.5" stroke="#b84fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Weverse<span>LIVE</span>
  </div>
  <div class="nav-icons">
    <svg viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
</nav>

<!-- Video -->
<div class="video-wrapper">
  <img src="/mnt/user-data/uploads/1782390605420_image.png" alt="이로진 라이브" id="streamImg"/>

  <div class="overlay-top">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="viewer-count">
      <svg viewBox="0 0 16 16"><path d="M8 3C4.5 3 1.5 5.5 0 8c1.5 2.5 4.5 5 8 5s6.5-2.5 8-5c-1.5-2.5-4.5-5-8-5z"/><circle cx="8" cy="8" r="2.5" fill="var(--bg)"/></svg>

  <div class="overlay-bottom">
    <div class="artist-info">
      <div class="artist-avatar">
        <img src="/mnt/user-data/uploads/1782390605420_image.png" alt="이로진"/>
      </div>
      <div>
        <div class="artist-name">로진 (ROJIN)</div>
        <div class="artist-handle">@AURA_official</div>
      </div>
    </div>
    <div class="live-title">🐰 오랜만에 들어왔다. 할 말 있어서.</div>

</div>

<!-- Timer -->
<div class="timer-bar">
  <div class="timer">방송 중 <strong id="liveTimer">00:11:23</strong></div>
  <div class="reaction-row" style="position:relative; padding-bottom:18px;">
    <button class="react-btn" onclick="addReaction(this, '🐰', 'heartCount')">🐰<span class="react-count" id="heartCount">8.3만</span></button>
    <button class="react-btn" onclick="addReaction(this, '🎵', 'starCount')">🎵<span class="react-count" id="starCount">5.6만</span></button>
    <button class="react-btn" onclick="addReaction(this, '💜', 'noteCount')">💜<span class="react-count" id="noteCount">4.1만</span></button>
  </div>
</div>

<!-- Main: Chat -->
<div class="main-content">
  <div class="chat-panel">
    <div class="chat-header">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      실시간 채팅
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="system-msg">💜 방송이 시작되었습니다</div>
    </div>

    <div class="chat-input-area">
      <input type="text" class="chat-input" placeholder="로진으로 메시지 입력..." id="chatInput" maxlength="80" onkeydown="handleKey(event)"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Bottom actions -->
<div class="bottom-actions">
  <button class="action-btn active" onclick="toggleHeart(this)">
    <svg viewBox="0 0 24 24" id="heartIcon" style="fill:#ff6eb4; stroke:#ff6eb4"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    <span>좋아요</span>
  </button>
  <button class="action-btn" onclick="this.querySelector('svg').style.stroke='#5bc4ff'">
    <svg viewBox="0 0 24 24"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
    <span>공유</span>
  </button>
  <button class="action-btn" id="cameraBtn" onclick="toggleCamera(this)">
    <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
    <span>캠</span>
  </button>
  <button class="action-btn" onclick="toggleGift(this)">
    <svg viewBox="0 0 24 24"><path d="M20 12v10H4V12M22 7H2v5h20V7zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
    <span>선물</span>
  </button>
</div>

<!-- Floating hearts container -->
<div class="hearts-container" id="heartsContainer"></div>

<script>
  // ── 채팅 데이터 ──
  const chatData = [
    { user: "aura_rojin_love", color: "#b84fff", text: "헐 로진오빠 라이브다!!!!!!!!!" },
    { user: "AURA_official_fan", color: "#5bc4ff", text: "오늘도 잘생겼다 진짜 ㅠㅠ" },
    { user: "rojin_world", color: "#ff6eb4", text: "할 말이 뭐예요!?!?!! 궁금해요" },
    { user: "aura_forever", color: "#c77dff", text: "소름... 뭐지... 신곡 발표 해줄거야?" },
    { user: "night_aura", color: "#ffa07a", text: "목소리 들으니까 눈물 나려고 ㅠㅠㅠㅠ" },
    { user: "rojin_stan", color: "#5bc4ff", text: "오빠 스케줄 없는 날에 라이브하는 거 처음 아니에요?" },
    { user: "aura_fan_kr", color: "#c77dff", text: "할 말 있다고요??? 컴백 예고예요??!!!" },
    { user: "heol_rojin", color: "#ff6eb4", text: "헐 그냥 보고싶어서라고요?? 로진이 그런 말 하는 거 처음 봤다" },
    { user: "aura_purple", color: "#b84fff", text: "로진아 밥은 먹었어?? 걱정돼 항상" },
    { user: "팬사랑해_로진", color: "#ffa07a", text: "커피만요?? ㅠㅠㅠ 밥 드세요!!!" },
    { user: "aura_melody", color: "#5bc4ff", text: "새벽에 버블에 작업 얘기 올렸던 거 봤어요 혹시 신곡 작업 중이에요?" },
  ];

  let chatIndex = 0;
  const messagesEl = document.getElementById('chatMessages');

  function appendMessage(data) {
    const msg = document.createElement('div');
    msg.className = 'chat-msg' + (data.isArtist ? ' artist-msg' : '');
    const initial = data.user.charAt(0).toUpperCase();
    const now = new Date();
    const t = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    msg.innerHTML = `
      <div class="msg-avatar" style="background:${data.color}22; color:${data.color}; border: 1.5px solid ${data.isArtist ? '#b84fff' : 'transparent'}">${initial}</div>
      <div class="msg-body">
        <div class="msg-user" style="color:${data.color}">${data.user}${data.isArtist ? ' <span style="font-size:10px;background:#b84fff22;color:#b84fff;padding:1px 5px;border-radius:3px;font-weight:500">아티스트</span>' : ''}</div>
        <div class="msg-text">${data.text}</div>
        <div class="msg-time">${t}</div>
      </div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  chatData.forEach((d, i) => {
    setTimeout(() => appendMessage(d), i * 600);
  });

  // Auto new messages
  const autoMsgs = [
    { user: "aura_overseas", color: "#ff6eb4", text: "ROJIN WE LOVE YOU FROM BRAZIL 💜" },
    { user: "도현", color: "#5bc4ff", text: "Oh My God", isArtist: true },
    { user: "aura_fan_us", color: "#c77dff", text: "WAIT SHE JUST- 💀💀💀 GANG GANG" },
    { user: "heol_dohyun", color: "#ffa07a", text: "옆에 도현 오빠 표정 ㅋㅋㅋㅋㅋㅋㅋㅋ" },
    { user: "aura_stan_1", color: "#b84fff", text: "이상하긴요 ㅋㅋㅋㅋ 완전 멋있어요 ㅠㅠ" },
    { user: "rojin_rabbit", color: "#ff6eb4", text: "로진 캐나다 갔다 오더니 완전 달라진 거 아직도 적응 안 돼 ㅋㅋㅋㅋ" },
    { user: "aura_melody", color: "#5bc4ff", text: "신곡 언제 나와요?? 얼른 듣고 싶다 ㅠㅠ" },
    { user: "rojin_world", color: "#c77dff", text: "로진 직캠 움짤 오늘도 프사로 쓰고 있어요 🐰💜" },
    { user: "night_aura", color: "#ffa07a", text: "레전드라서요 ㅠㅠ 영원히 퍼질 거예요 ㅋㅋㅋㅋ" },
  ];

  let autoIdx = 0;
  setInterval(() => {
    if (autoIdx < autoMsgs.length) {
      appendMessage(autoMsgs[autoIdx++]);
    } else {
      autoIdx = 0;
    }
  }, 3800);

  // ── 뷰어 수 변동 ──
  let viewers = 203491;
  setInterval(() => {
    viewers += Math.floor(Math.random() * 60) - 15;
    if (viewers < 180000) viewers = 180000;
    document.getElementById('viewerNum').textContent = viewers.toLocaleString('ko-KR');
  }, 4000);

  // ── 라이브 타이머 ──
  let seconds = 11 * 60 + 23;
  setInterval(() => {
    seconds++;
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('liveTimer').textContent = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
  }, 1000);

  // ── 리액션 카운트 ──
  const rawCounts = { heartCount: 83000, starCount: 56000, noteCount: 41000 };
  function addReaction(btn, emoji, id) {
    rawCounts[id] += Math.floor(Math.random() * 50 + 10);
    const n = rawCounts[id];
    document.getElementById(id).textContent = n >= 10000 ? (n/10000).toFixed(1) + '만' : n.toLocaleString();
    spawnHeart(emoji);
  }

  // ── 플로팅 하트 ──
  function spawnHeart(emoji = '💜') {
    const c = document.getElementById('heartsContainer');
    const el = document.createElement('div');
    el.className = 'floating-heart';
    el.textContent = emoji;
    el.style.left = (Math.random() * 20) + 'px';
    c.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
  setInterval(() => spawnHeart(['💜','🐰','🎵','⭐','✨'][Math.floor(Math.random()*5)]), 2200);

  // ── 채팅 입력 ──
  function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

  // ── 팬 실시간 반응 생성 ──
  const fanColors = ['#b84fff','#5bc4ff','#ff6eb4','#c77dff','#ffa07a'];
  let typingEl = null;

  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'system-msg';
    typingEl.id = 'typingIndicator';
    typingEl.textContent = '팬들이 입력 중...';
    messagesEl.appendChild(typingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  // ── AURA 멤버 설정 (팬 반응이 기억해야 하는 그룹 로어) ──
  const auraLore = `
[보이그룹 AURA 멤버 설정]
- 이로진 (로진, 20세): 센터 & 메인보컬. 지금 라이브 방송 중인 본인.
- 도현 (20세): 리더 & 메인보컬. 다정하고 만능형이지만 30% 확률로 공연 전날부터 아파서 무대에서 앉아 노래함. 서바이벌 프로그램(방과후 리부트) 출신, 위암 초기 극복 후 데뷔. 요리를 잘해서 멤버들 밥을 챙겨줌(양이 항상 많음). 버블 매우 성실(하루 4~5번 답장), 인스타 라방은 한 달에 한 번 정도만 준비해서 함. 먹방 예능에서 간장게장 먹고 화제, 문제적 남자 출연. 발라드 커버 좋아함. 리안·은휘를 동생처럼 챙기지만 본인이 아파서 잘 못 챙긴다는 죄책감 있음.
- 은휘 (본명 이봉수, 17세): 래퍼. 팀 막내, 비주얼 깡패라 직캠 조회수는 항상 1위지만 노래·랩 실력은 논란거리(렉카한테 자주 물어뜯김). 태도 논란 꾸준함(버블 한 달에 한 번꼴 접속, 영통팬싸 동태눈 논란, "아 정말요?" 밈). 그런데도 관종이라 인스타 라방은 자주 킴, 외모 자기애 강해서 라방 중 얼굴 안 예뻐 보이면 바로 꺼버림. 악개 문제 심함(타팀·동료 팬덤과도 자주 싸움). 모에화 동물은 여우.
- 리안 (본명 허태오, 17세): 메인댄서 & 서브래퍼. 유명 탤런트 허진오의 아들, 어릴 때 슈퍼맨이 돌아왔다 출연. 원래 댄스 신동 출신 유튜버. 장난꾸러기라 버블/라이브에서 진담 반 거짓말 반 섞어 말하는 게 유명해서 팬들 사이 "리안어 번역기" 계정이 따로 있을 정도("저 지금 공항이에요" 하고 사실 집에 있던 사례 등). 버블은 자주 함(주 4~6회). 승부욕 강하고 집중하면 볼이 빵빵해짐. 부모님 얘기 별로 안 좋아함.
팬들은 이 멤버 설정을 잘 알고 있는 진성 팬덤이다. 로진의 말에 반응할 때 자연스럽게 다른 멤버를 언급하거나 비교해도 좋다(예: 도현 걱정, 은휘 드립, 리안 구라 의심 등). 단, 항상 로진이 방금 한 말에 대한 반응이 중심이어야 한다.`;

  // ⚠️ 아래 PROXY_URL을 본인이 배포한 Cloudflare Worker 주소로 바꿔주세요.
  // 예: 'https://rojin-live-proxy.your-subdomain.workers.dev'
  const PROXY_URL = 'https://rojin-live-proxy.your-subdomain.workers.dev';

  async function getFanReactions(rojinText) {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 400,
        system: `너는 한국 K-POP 라이브 방송 채팅창의 팬 반응을 생성하는 엔진이다. 아티스트 '로진'(남성, 보이그룹 AURA 멤버)이 방금 채팅에 메시지를 남겼다. 그 메시지 내용에 정확히 반응하는, 서로 다른 가상 팬 2~4명의 짧은 채팅 댓글을 만들어라. 말투는 실제 K-POP 팬 라이브 채팅처럼 캐주얼하게 (ㅋㅋㅋ, ㅠㅠ, !!!, 이모지 가끔) 작성하고 각 댓글은 25자 이내로 짧게.${auraLore}
절대 마크다운이나 설명 없이, 오직 아래 JSON 배열 형식으로만 답하라: [{"user":"팬닉네임","text":"댓글"}]`,
        messages: [{ role: 'user', content: `로진이 방금 채팅에 쓴 말: "${rojinText}"` }]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || '').join('').trim();
    const clean = raw.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    appendMessage({ user: '로진', color: '#b84fff', text, isArtist: true });
    input.value = '';

    showTyping();
    try {
      const reactions = await getFanReactions(text);
      hideTyping();
      reactions.forEach((r, i) => {
        setTimeout(() => {
          appendMessage({ user: r.user, color: fanColors[Math.floor(Math.random()*fanColors.length)], text: r.text });
        }, 500 + i * (600 + Math.random()*500));
      });
    } catch (err) {
      hideTyping();
      console.error('팬 반응 생성 실패:', err);
    }
  }

  // ── 좋아요 토글 ──
  function toggleHeart(btn) {
    const svg = btn.querySelector('svg');
    const active = btn.classList.toggle('active');
    svg.style.fill = active ? '#ff6eb4' : 'none';
    svg.style.stroke = active ? '#ff6eb4' : 'currentColor';
    if (active) spawnHeart('💜');
  }

  // ── 카메라 ──
  function toggleCamera(btn) {
    btn.classList.toggle('active');
    const svg = btn.querySelector('svg');
    svg.style.stroke = btn.classList.contains('active') ? '#5bc4ff' : '';
  }

  // ── 선물 ──
  function toggleGift(btn) {
    const icons = ['🎁','⭐','💎','🐰'];
    spawnHeart(icons[Math.floor(Math.random()*icons.length)]);
    const sys = document.createElement('div');
    sys.className = 'system-msg';
    sys.textContent = '💜 내가 별풍선을 선물했습니다!';
    messagesEl.appendChild(sys);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
